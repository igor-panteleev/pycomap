name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write

    outputs:
      tag: ${{ steps.version.outputs.tag }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
      tag_created: ${{ steps.tag.outputs.tag_created }}

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check && uv run ruff format --check

      - name: Type check
        run: uv run ty check

      - name: Unit tests
        run: uv run pytest tests/unit -q

      - name: Read version and detect pre-release
        id: version
        run: |
          VERSION=$(python3 -c "import tomllib; d=tomllib.load(open('pyproject.toml','rb')); print(d['project']['version'])")
          TAG="v$VERSION"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(a|b|rc)[0-9]+ ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create tag if not exists
        id: tag
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG already exists, skipping release"
            echo "tag_created=false" >> $GITHUB_OUTPUT
          else
            git tag "$TAG"
            git push origin "$TAG"
            echo "tag_created=true" >> $GITHUB_OUTPUT
          fi

      - name: Build
        if: steps.tag.outputs.tag_created == 'true'
        run: uv build

      - name: Create GitHub Release
        if: steps.tag.outputs.tag_created == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ steps.version.outputs.is_prerelease == 'true' }}
          files: dist/*

      - name: Publish to PyPI
        if: steps.tag.outputs.tag_created == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1

  docs:
    needs: release
    if: needs.release.outputs.tag_created == 'true' && needs.release.outputs.is_prerelease == 'false'
    uses: ./.github/workflows/deploy-docs.yml
