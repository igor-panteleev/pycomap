site_name: pycomap
site_url: https://igor-panteleev.github.io/pycomap/
site_description: Async Python client for ComAp controllers

theme:
  name: material
  icon:
    logo: material/generator-stationary
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate
  palette:
    - scheme: slate
      primary: orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            show_if_no_docstring: false
            merge_init_into_class: true

extra_css:
  - https://cdn.jsdelivr.net/npm/slim-select@4.0.4/dist/slimselect.css
  - css/extra.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/tablesort@5.7.1/dist/tablesort.min.js
  - https://cdn.jsdelivr.net/npm/tablesort@5.7.1/dist/sorts/tablesort.number.min.js
  - https://cdn.jsdelivr.net/npm/slim-select@4.0.4/dist/slimselect.iife.js
  - js/extra.js

nav:
  - Home: index.md
  - API Reference:
    - Controller: api/controller.md
    - Low-level Client: api/client.md
    - Configuration: api/configuration.md
    - Data Types: api/datatypes.md
    - Discovery: api/discovery.md
    - Alarms: api/alarms.md
    - History: api/history.md
    - Exceptions: api/exceptions.md
  - Controller Reference: controller_reference.md
  - Protocol Notes: protocol.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
